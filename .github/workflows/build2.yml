name: 正式版 Build zink (aarch64)

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'refs/tags/**'
  schedule:
    - cron: '0 6 * * *'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04-arm

    steps:
    - name: 检出仓库
      uses: actions/checkout@v4
      
    - name: 修复依赖
      run: |
          sudo apt clean
          sudo apt autoclean
          sudo rm -rf /var/lib/apt/lists/*
          sudo apt update
          sudo rm /var/lib/apt/lists/lock
          sudo rm /var/cache/apt/archives/lock

    - name: 安装依赖
      run: |
        sudo sed -i "s/^Types: deb$/Types: deb deb-src/" /etc/apt/sources.list.d/ubuntu.sources
        sudo apt update
        sudo apt install libxrandr-dev libxxf86vm-dev libxcb-shm0-dev libxcb-glx0-dev libxext-dev libx11-dev libx11-xcb-dev libxcb1-dev libxcb-dri3-dev libxcb-present-dev libxcb-randr0-dev libxcb-sync-dev libxcb-xfixes0-dev libxshmfence-dev libdrm-dev libgbm-dev libegl1-mesa-dev libexpat1-dev libwayland-dev -y
        sudo apt install -y python3-pip
        pip3 install --user meson ninja mako

    - name: 克隆 Mesa 正式版
      run: |
          echo "📥 克隆 Mesa 仓库..."
          git clone https://gitlab.freedesktop.org/mesa/mesa.git
          cd mesa

          echo "🔍 获取最新稳定标签..."
          LATEST_TAG=$(git describe --tags `git rev-list --tags --max-count=1`)
          echo "最新标签: $LATEST_TAG"

          git checkout $LATEST_TAG
          echo "LATEST_TAG=$LATEST_TAG" >> $GITHUB_ENV

          echo "🧾 最新提交:"
          git log -1 --oneline --decorate
          MESA_COMMIT=$(git rev-parse --short HEAD)
          echo "MESA_COMMIT=$MESA_COMMIT" >> $GITHUB_ENV

    - name: 构建 Mesa (Zink only)
      run: |
        cd mesa
        sudo mkdir -p /data/data/com.termux/files/usr/glibc
        sudo chmod 777 -R /data
        mkdir -p builddir
        meson setup builddir \
          --libdir=lib \
          --prefix=/data/data/com.termux/files/usr/glibc \
          -Dbuildtype=release \
          -Dgallium-drivers=zink,freedreno \
          -Dvulkan-drivers= \
          -Dglvnd=disabled \
          -Dplatforms=x11 \
          -Degl-native-platform=x11 \
          -Dxmlconfig=disabled \
          -Dllvm=disabled \
          -Dxlib-lease=enabled \
          -Dopengl=true \
          -Dglx=xilb \
          -Dglx-direct=true \
          -Dgles1=disabled \
          -Dgles2=disabled \
          -Degl=disabled
        ninja -C builddir
        ninja -C builddir install

        VERSION=$(cat VERSION)
        echo "VERSION=$VERSION" >> $GITHUB_ENV

        cd /data/data/com.termux/files/usr/glibc/lib
        rm -rf dri gbm pkgconfig

    - name: 打包 lib 文件夹（保留文件夹结构）
      run: |
        # 返回到 glibc 目录的父目录
        cd /data/data/com.termux/files/usr
        
        # 创建压缩包（包含 lib 文件夹）
        FULL_TAR="termux-glibc-zink-${VERSION}-aarch64.tar.gz"
        
        # 只打包 glibc/lib 目录，保持目录结构
        tar -czf $GITHUB_WORKSPACE/$FULL_TAR glibc/lib/
        
        echo "FULL_TAR=$FULL_TAR" >> $GITHUB_ENV
        
        echo "📦 打包完成，压缩包结构："
        tar -tzf $GITHUB_WORKSPACE/$FULL_TAR | head -20

    - name: 生成 SHA256 校验
      run: |
        cd $GITHUB_WORKSPACE
        sha256sum $FULL_TAR > $FULL_TAR.sha256
        echo "🔐 生成校验文件完成"

    - name: 上传构建产物
      uses: actions/upload-artifact@v4
      with:
        name: mesa-artifacts-${{ env.VERSION }}-aarch64
        path: |
          ${{ env.FULL_TAR }}
          ${{ env.FULL_TAR }}.sha256

    - name: 发布到 GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: mesa-${{ env.VERSION }}
        name: 正式版 Mesa ${{ env.VERSION }} (aarch64, Termux glibc)
        body: |
          🔧 **Mesa 自动构建信息**
          - 🧱 版本: **${{ env.VERSION }}**
          - 💡 提交: `${{ env.MESA_COMMIT }}`
          - 📍 架构: aarch64
          - 🕒 自动构建与打包成功
          - 📦 产物：
            - `${{ env.FULL_TAR }}` → 包含 lib 目录的 Mesa 库文件
          - 🔐 附带 `.sha256` 校验文件
          
          **使用方法：**
          1. 解压到 Termux：`tar -xzf ${{ env.FULL_TAR }} -C $PREFIX/`
          2. 自动将库文件放置到正确位置：`$PREFIX/glibc/lib/`
        files: |
          ${{ env.FULL_TAR }}
          ${{ env.FULL_TAR }}.sha256
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: 保存最新提交记录
      run: |
        echo "${{ env.MESA_COMMIT }}" > .mesa_latest_commit
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add .mesa_latest_commit || true
        git commit -m "Update Mesa commit record to ${{ env.MESA_COMMIT }}" || echo "No new commit to save"
        git push || echo "⚠️ 推送失败（可能无更改）"

    - name: 输出总结信息
      run: |
        echo "======================================"
        echo "    ✅ Mesa 构建与打包完成"
        echo "======================================"
        echo "🔖 Mesa 版本: ${{ env.VERSION }}"
        echo "💾 提交哈希: ${{ env.MESA_COMMIT }}"
        echo "📦 产物: ${{ env.FULL_TAR }}"
        echo "📁 压缩包内容:"
        echo "   glibc/lib/ (包含所有 Mesa 库文件)"
        echo "📅 构建时间: $(date)"
        uname -a
